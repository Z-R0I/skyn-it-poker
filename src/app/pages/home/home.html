<main class="home">
  <div class="home__bg-cards" aria-hidden="true">
    <span class="bg-card" style="--i: 0">1</span>
    <span class="bg-card" style="--i: 1">3</span>
    <span class="bg-card" style="--i: 2">5</span>
    <span class="bg-card" style="--i: 3">8</span>
    <span class="bg-card" style="--i: 4">13</span>
    <span class="bg-card" style="--i: 5">21</span>
  </div>

  <section class="card-panel">
    <header class="card-panel__head">
      <h1 class="brand">
        <span class="brand__icon">♠</span>
        skyn-it poker
      </h1>
      <p class="subtitle">Estimación ágil en equipo, sin fricción.</p>
    </header>

    @if (mode() === 'choose') {
      <div class="choices">
        <button class="choice choice--create" (click)="choose('create')">
          <div class="choice__icon">+</div>
          <div class="choice__text">
            <h2>Crear sala</h2>
            <p>Inicia una nueva partida e invita a tu equipo.</p>
          </div>
        </button>

        <button class="choice choice--join" (click)="choose('join')">
          <div class="choice__icon">→</div>
          <div class="choice__text">
            <h2>Unirse a sala</h2>
            <p>Entra con el código que te han compartido.</p>
          </div>
        </button>
      </div>
    }

    @if (mode() === 'create') {
      <form class="form" (submit)="$event.preventDefault(); createRoom()">
        <h2 class="form__title">Crear sala</h2>

        <label class="field">
          <span>Tu nombre</span>
          <input
            type="text"
            name="name"
            [(ngModel)]="name"
            placeholder="Ej. Ana"
            autocomplete="off"
            required
          />
        </label>

        @if (error()) { <p class="form__error">{{ error() }}</p> }

        <div class="form__actions">
          <button type="button" class="btn btn--ghost" (click)="back()" [disabled]="loading()">Atrás</button>
          <button type="submit" class="btn btn--primary" [disabled]="!name.trim() || loading()">
            {{ loading() ? 'Creando...' : 'Crear sala' }}
          </button>
        </div>
      </form>
    }

    @if (mode() === 'join') {
      <form class="form" (submit)="$event.preventDefault(); joinRoom()">
        <h2 class="form__title">Unirse a sala</h2>

        <label class="field">
          <span>Tu nombre</span>
          <input
            type="text"
            name="name"
            [(ngModel)]="name"
            placeholder="Ej. Ana"
            autocomplete="off"
            required
          />
        </label>

        <label class="field">
          <span>Código de sala</span>
          <input
            type="text"
            name="roomCode"
            [(ngModel)]="roomCode"
            placeholder="ABC123"
            autocomplete="off"
            maxlength="10"
            class="field__input--code"
            required
          />
        </label>

        @if (error()) { <p class="form__error">{{ error() }}</p> }

        <div class="form__actions">
          <button type="button" class="btn btn--ghost" (click)="back()" [disabled]="loading()">Atrás</button>
          <button
            type="submit"
            class="btn btn--primary"
            [disabled]="!name.trim() || !roomCode.trim() || loading()"
          >
            {{ loading() ? 'Entrando...' : 'Entrar' }}
          </button>
        </div>
      </form>
    }
  </section>
</main>
